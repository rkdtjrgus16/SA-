<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>마이샵</title>
    <script>
      // GitHub Pages SPA 리다이렉트: 404 발생 시 index.html로 경로 전달
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') + '/?p=' +
        l.pathname.slice(1).split('/').slice(1).join('/') +
        (l.search ? '&q=' + l.search.slice(1) : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
